apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    app.kubernetes.io/component: lifecycle-agent
    app.kubernetes.io/name: lifecycle-agent-operator
    control-plane: controller-manager
    openshift.io/user-monitoring: "false"
  name: lifecycle-agent-controller-manager-metrics-monitor
spec:
  endpoints:
  - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
    path: /metrics
    port: https
    scheme: https
    tlsConfig:
      caFile: /etc/prometheus/configmaps/serving-certs-ca-bundle/service-ca.crt
      certFile: /etc/prometheus/secrets/metrics-client-certs/tls.crt
      keyFile: /etc/prometheus/secrets/metrics-client-certs/tls.key
      serverName: lifecycle-agent-controller-manager-metrics-service
  selector:
    matchLabels:
      app.kubernetes.io/component: lifecycle-agent
      app.kubernetes.io/name: lifecycle-agent-operator
      control-plane: controller-manager
